<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            background-color: #F5F5DC;
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
        }

        .header {
            background-color: #6F4E37;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .logout-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background-color: white;
            color: #6F4E37;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .container {
            width: 85%;
            margin: auto;
            margin-top: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .card h3 {
            color: #6F4E37;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
        }

        .nav {
            text-align: center;
            margin-top: 20px;
        }

        .nav a {
            display: inline-block;
            margin: 10px;
            padding: 10px 18px;
            background-color: #6F4E37;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .nav a:hover {
            background-color: #4B2E2B;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="/static/logo.png" alt="Logo" style="position:absolute; left:20px; top:50%; transform:translateY(-50%); height:60px; border-radius:6px;">
    <h2>Admin Dashboard</h2>
    <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
</div>

<div class="container">

    <div class="stats">
        <div class="card">
            <h3>Total Students</h3>
            <p>{{ total_students }}</p>
        </div>

        <div class="card">
            <h3>Total Companies</h3>
            <p>{{ total_companies }}</p>
        </div>

        <div class="card">
            <h3>Total Drives</h3>
            <p>{{ total_drives }}</p>
        </div>

        <div class="card">
            <h3>Total Applications</h3>
            <p>{{ total_applications }}</p>
        </div>
    </div>

    <div class="nav">
        <a href="/all_companies">Manage Companies</a>
        <a href="/admin_drives">Manage Drives</a>
        <a href="/all_students">View Students</a>
        <a href="/all_applications">View Applications</a>
    </div>

</div>

</body>
</html>
