<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <style>
        body {
            background-color: #F5F5DC;
            font-family: "Segoe UI", Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }

        .box {
            background-color: white;
            width: 420px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
        }

        h2 {
            color: #6F4E37;
        }

        a {
            color: #6F4E37;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="box">
        <img src="/static/logo.png" alt="Logo" style="display:block; margin:0 auto 15px auto; height:65px; border-radius:8px;">
        <h2>Oops, something went sideways</h2>
        <p>{{ message if message else "Something unexpected happened. Let's try that again." }}</p>
        <a href="/">← Back to Home</a>
    </div>

</body>
</html>
