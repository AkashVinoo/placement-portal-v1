<!DOCTYPE html>
<html>

<head>
    <title>The Daily Grind</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #F5F5DC;
            text-align: center;
        }

        .hero {
            background-color: #6F4E37;
            color: white;
            padding: 70px 20px;
        }

        .hero h1 {
            margin: 0;
            font-size: 40px;
        }

        .hero p {
            margin-top: 12px;
            font-size: 18px;
        }

        .container {
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            background-color: #6F4E37;
            color: white;
            padding: 12px 22px;
            margin: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #4B2E2B;
        }

        .info {
            width: 70%;
            margin: 40px auto;
            background-color: white;
            padding: 25px;
            border-radius: 12px;
        }

        h2 {
            color: #6F4E37;
        }
    </style>
</head>

<body>

    <div class="hero">
        <img src="/static/logo.png" alt="Logo" style="height:75px; border-radius:10px; margin-bottom:15px;">
        <h1>The Daily Grind</h1>
        <p>Where talent meets opportunity</p>
    </div>

    <div class="container">
        <a class="btn" href="/login">Login</a>
        <a class="btn" href="/register_student">Student Register</a>
        <a class="btn" href="/register_company">Company Register</a>
    </div>

    <div class="info">
        <h2>What this is about</h2>
        <p>
            This placement portal helps institutes manage students, company registrations,
            placement drives, and student applications — all in one spot.
        </p>
    </div>

    <p style="color: #6F4E37; margin-bottom: 30px; font-size: 14px;">A platform developed by Bytebrewer Akash!</p>

</body>

</html>
